<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - METRICGOAL</title>
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        /* Estilo para el mensaje de error integrado */
        .error-message {
            display: none; 
            background: rgba(255, 0, 0, 0.15);
            color: #ff4d4d;
            border: 1px solid rgba(255, 0, 0, 0.3);
            padding: 10px;
            border-radius: 5px;
            margin-top: 15px;
            font-size: 14px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>

<body class="login-page">

    <div class="login-container">
        <div class="login-header">
            <h1>METRIC<span>GOAL</span></h1>
            <p>Gestión y Analítica Deportiva</p>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" placeholder="entrenador@metricgoal.com" required>
            </div>

            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login">Iniciar Sesión</button>
            
            <div id="errorMessage" class="error-message"></div>
        </form>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const errorDisplay = document.getElementById('errorMessage');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Limpiar errores previos
            errorDisplay.style.display = 'none';
            errorDisplay.textContent = '';

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // ... dentro del event listener ...
            try {
                // CAMBIO 1: Añadir /login al final de la URL
                // Lo mejor es usar una ruta relativa para que funcione en local y en Render
                const response = await fetch('/login', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const result = await response.json();

                if (response.ok) {
                    localStorage.setItem('usuarioNombre', result.nombre); 
                    localStorage.setItem('usuarioClub', result.club); 
                    localStorage.setItem('usuarioEquipo', result.equipo); 
                    localStorage.setItem('idEquipo', result.id_equipo);
                    
                    // CAMBIO 2: Redirigir a la RUTA de FastAPI, no al archivo .html
                    window.location.href = '/dashboard'; 
                } else {
                    errorDisplay.textContent = result.detail || "Credenciales incorrectas";
                    errorDisplay.style.display = 'block';
                }
            } catch (error) {
                errorDisplay.textContent = "🔌 Error: El servidor no responde.";
                errorDisplay.style.display = 'block';
            }
        });
    </script>
</body>
</html>
